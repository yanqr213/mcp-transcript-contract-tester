name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Smoke test CLI
        run: |
          mcp-transcript-contract-tester examples/clean.transcript.jsonl --schema examples/tools.schema.json --check error
          mcp-transcript-contract-tester examples/broken.transcript.json --schema examples/tools.schema.json --format json --output report.json || true
          mcp-transcript-contract-tester examples/broken.transcript.json --schema examples/tools.schema.json --format sarif --output report.sarif || true
          python -m json.tool report.sarif > /dev/null
